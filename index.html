<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вампирские кланы</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin: 10px 0;
}

/* Контейнер */
.main {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 75vh;
  gap: 40px;
}

/* Фракции */
.faction {
  position: relative;
}

/* Размеры */
.center {
  width: 525px;  /* было 350 → +50% */
  height: 525px;
}

.side {
  width: 300px;
  height: 300px;
}

/* Символ */
.symbol {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: brightness(0) invert(1);
  opacity: 0.2;
}

/* Узлы */
.node {
  position: absolute;
  width: 60px;
  text-align: center;
  transform: translate(-50%, -50%);
  cursor: pointer;
}

.node img {
  width: 50px;
  height: 50px;
  filter: brightness(0) invert(1);
  transition: 0.2s;
}

.node:hover img {
  transform: scale(1.15);
}

.label {
  font-size: 12px;
}

/* Инфо */
#info {
  height: 80px;
  border-top: 1px solid #333;
  padding: 10px;
}
</style>
</head>

<body>

<h1>Вампирские кланы</h1>

<div class="main">

  <!-- НЕЗАВИСИМЫЕ -->
  <div class="faction side">

    <!-- Ассамиты (верх) -->
    <div class="node" style="top:15%; left:50%;" onclick="showClan('assamite')">
      <img src="images/assamite.png">
      <div class="label">Ассамиты</div>
    </div>

    <!-- Равнос (низ) -->
    <div class="node" style="top:85%; left:50%;" onclick="showClan('ravnos')">
      <img src="images/ravnos.png">
      <div class="label">Равнос</div>
    </div>

    <!-- Джованни (лево) -->
    <div class="node" style="top:50%; left:30%;" onclick="showClan('giovanni')">
      <img src="images/giovanni.png">
      <div class="label">Джованни</div>
    </div>

    <!-- Сетиты (право) -->
    <div class="node" style="top:50%; left:70%;" onclick="showClan('setite')">
      <img src="images/followers_of_set.png">
      <div class="label">Сетиты</div>
    </div>

  </div>

  <!-- КАМАРИЛЬЯ -->
  <div class="faction center">
    <img src="images/camarilla.png" class="symbol">

    <div class="node" style="top:5%; left:50%;" onclick="showClan('ventrue')">
      <img src="images/ventrue.png">
      <div class="label">Вентру</div>
    </div>

    <div class="node" style="top:28%; left:50%;" onclick="showClan('toreador')">
      <img src="images/toreador.png">
      <div class="label">Тореадор</div>
    </div>

    <div class="node" style="top:44%; left:35%;" onclick="showClan('malkavian')">
      <img src="images/malkavian.png">
      <div class="label">Малкавиан</div>
    </div>

    <div class="node" style="top:44%; left:65%;" onclick="showClan('tremere')">
      <img src="images/tremere.png">
      <div class="label">Тремер</div>
    </div>

    <div class="node" style="top:90%; left:50%;" onclick="showClan('nosferatu')">
      <img src="images/nosferatu.png">
      <div class="label">Носферату</div>
    </div>

    <div class="node" style="top:70%; left:50%;" onclick="showClan('gangrel')">
      <img src="images/gangrel.png">
      <div class="label">Гангрел</div>
    </div>

    <div class="node" style="top:52%; left:50%;" onclick="showClan('brujah')">
      <img src="images/brujah.png">
      <div class="label">Бруха</div>
    </div>
  </div>

  <!-- ШАБАШ -->
  <div class="faction side">
    <img src="images/sabbat.png" class="symbol">

    <!-- Ласомбра -->
    <div class="node" style="top:50%; left:70%;" onclick="showClan('lasombra')">
      <img src="images/lasombra.png">
      <div class="label">Ласомбра</div>
    </div>

    <!-- Цимисхи -->
    <div class="node" style="top:50%; left:30%;" onclick="showClan('tzimisce')">
      <img src="images/tzimisce.png">
      <div class="label">Цимисхи</div>
    </div>

  </div>

</div>

<div id="info">
  <h2 id="clanName">Выбери клан</h2>
  <p id="clanDesc"></p>
  <button id="moreBtn" style="display:none;">Подробнее</button>
</div>

<script>
const clans = {
  ventrue:{
    name:"Вентру",
    desc:"Правящая элита Камарильи.",
    link:"ventrue.html"
  },
  toreador:{
    name:"Тореадор",
    desc:"Любители искусства.",
    link:"toreador.html"
  },
  malkavian:{
    name:"Малкавиан",
    desc:"Безумцы.",
    link:"malkavian.html"
  },
  tremere:{
    name:"Тремер",
    desc:"Маги крови.",
    link:"tremere.html"
  },
  nosferatu:{
    name:"Носферату",
    desc:"Мастера информации.",
    link:"nosferatu.html"
  },
  gangrel:{
    name:"Гангрел",
    desc:"Дикие.",
    link:"gangrel.html"
  },
  brujah:{
    name:"Бруха",
    desc:"Бунтари.",
    link:"brujah.html"
  },

  assamite:{
    name:"Ассамиты",
    desc:"Убийцы.",
    link:"assamite.html"
  },
  ravnos:{
    name:"Равнос",
    desc:"Обманщики.",
    link:"ravnos.html"
  },
  giovanni:{
    name:"Джованни",
    desc:"Некроманты.",
    link:"giovanni.html"
  },
  setite:{
    name:"Сетиты",
    desc:"Культ змеи.",
    link:"setite.html"
  },

  lasombra:{
    name:"Ласомбра",
    desc:"Владыки теней.",
    link:"lasombra.html"
  },
  tzimisce:{
    name:"Цимисхи",
    desc:"Повелители плоти.",
    link:"tzimisce.html"
  }
};

function showClan(id) {
  const clan = clans[id];

  document.getElementById("clanName").innerText = clan.name;
  document.getElementById("clanDesc").innerText = clan.desc;

  const btn = document.getElementById("moreBtn");
  btn.style.display = "inline-block";
  btn.onclick = () => {
    window.location.href = clan.link;
  };
}
</script>

</body>
</html>
