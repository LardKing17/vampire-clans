<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Vampire Clans</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 30px;
}

/* Контейнер */
.tree-container {
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

/* Узлы */
.node circle {
  fill: #111;
  stroke: white;
  stroke-width: 2;
  transition: 0.3s;
}

.node:hover circle {
  stroke: red;
  transform: scale(1.05);
  transform-origin: center;
}

/* ИКОНКИ — делаем белыми */
.node image {
  pointer-events: none;
  filter: brightness(0) invert(1);
}

/* Линии */
line {
  stroke: white;
  stroke-width: 2;
}

/* Инфо */
#info {
  margin-top: 40px;
  padding: 20px;
  border-top: 1px solid #333;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: black;
  color: white;
  border: 1px solid white;
  cursor: pointer;
}

button:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<h1>Camarilla Clans</h1>

<div class="tree-container">
<svg width="900" height="500">

  <!-- ЛИНИИ ОТ ЦЕНТРА -->
  <line x1="450" y1="120" x2="200" y2="350"/>
  <line x1="450" y1="120" x2="450" y2="350"/>
  <line x1="450" y1="120" x2="700" y2="350"/>

  <!-- ЦЕНТР: CAMARILLA -->
  <g class="node">
    <circle cx="450" cy="120" r="60"/>
    <image href="images/camarilla.png" x="400" y="70" width="100" height="100"/>
  </g>

  <!-- BRUJAH -->
  <g class="node" onclick="showClan('brujah')" style="cursor:pointer;">
    <circle cx="200" cy="350" r="50"/>
    <image href="images/brujah.png" x="160" y="310" width="80" height="80"/>
  </g>

  <!-- TOREADOR -->
  <g class="node" onclick="showClan('toreador')" style="cursor:pointer;">
    <circle cx="450" cy="350" r="50"/>
    <image href="images/toreador.png" x="410" y="310" width="80" height="80"/>
  </g>

  <!-- VENTRUE -->
  <g class="node" onclick="showClan('ventrue')" style="cursor:pointer;">
    <circle cx="700" cy="350" r="50"/>
    <image href="images/ventrue.png" x="660" y="310" width="80" height="80"/>
  </g>

</svg>
</div>

<div id="info">
  <h2 id="clanName">Выбери клан</h2>
  <p id="clanDesc"></p>
  <button id="moreBtn" style="display:none;">Подробнее</button>
</div>

<script>
const clans = {
  brujah: {
    name: "Brujah",
    desc: "Бунтари и революционеры, движимые страстью и гневом.",
    link: "brujah.html"
  },
  toreador: {
    name: "Toreador",
    desc: "Поклонники красоты, искусства и человеческих эмоций.",
    link: "toreador.html"
  },
  ventrue: {
    name: "Ventrue",
    desc: "Правящая элита вампирского общества.",
    link: "ventrue.html"
  }
};

function showClan(id) {
  const clan = clans[id];

  document.getElementById("clanName").innerText = clan.name;
  document.getElementById("clanDesc").innerText = clan.desc;

  const btn = document.getElementById("moreBtn");
  btn.style.display = "inline-block";
  btn.onclick = () => {
    window.location.href = clan.link;
  };
}
</script>

</body>
</html>
