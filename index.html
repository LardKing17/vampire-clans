<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вампирские кланы</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 30px;
}

/* Контейнер */
.wrapper {
  position: relative;
  width: 800px;
  height: 800px;
  margin: 40px auto;
}

/* Символ Камарильи */
.symbol {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: brightness(0) invert(1);
  opacity: 0.3;
}

/* Узлы */
.node {
  position: absolute;
  width: 80px;
  text-align: center;
  cursor: pointer;
  transform: translate(-50%, -50%);
}

.node img {
  width: 70px;
  height: 70px;
  filter: brightness(0) invert(1);
  transition: 0.3s;
}

.node:hover img {
  transform: scale(1.1);
}

/* Подписи */
.label {
  font-size: 14px;
  margin-top: 5px;
}

/* Инфо */
#info {
  margin-top: 20px;
  padding: 20px;
  border-top: 1px solid #333;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: black;
  color: white;
  border: 1px solid white;
  cursor: pointer;
}

button:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<h1>Вампирские кланы</h1>

<div class="wrapper">

  <!-- Символ -->
  <img src="images/camarilla.png" class="symbol">

 <!-- Вентру (верхняя дуга) -->
<div class="node" style="top: 5%; left: 50%;" onclick="showClan('ventrue')">
  <img src="images/ventrue.png">
  <div class="label">Вентру</div>
</div>

<!-- Тореадор (верх креста) -->
<div class="node" style="top: 28%; left: 50%;" onclick="showClan('toreador')">
  <img src="images/toreador.png">
  <div class="label">Тореадор</div>
</div>

<!-- Малкавиан (лево) -->
<div class="node" style="top: 44%; left: 35%;" onclick="showClan('malkavian')">
  <img src="images/malkavian.png">
  <div class="label">Малкавиан</div>
</div>

<!-- Тремер (право) -->
<div class="node" style="top: 44%; left: 65%;" onclick="showClan('tremere')">
  <img src="images/tremere.png">
  <div class="label">Тремер</div>
</div>

<!-- Носферату (низ) -->
<div class="node" style="top: 90%; left: 50%;" onclick="showClan('nosferatu')">
  <img src="images/nosferatu.png">
  <div class="label">Носферату</div>
</div>

<!-- Гангрел -->
<div class="node" style="top: 70%; left: 50%;" onclick="showClan('gangrel')">
  <img src="images/gangrel.png">
  <div class="label">Гангрел</div>
</div>

<!-- Бруха -->
<div class="node" style="top: 52%; left: 50%;" onclick="showClan('brujah')">
  <img src="images/brujah.png">
  <div class="label">Бруха</div>
</div>
</div>

<div id="info">
  <h2 id="clanName">Выбери клан</h2>
  <p id="clanDesc"></p>
  <button id="moreBtn" style="display:none;">Подробнее</button>
</div>

<script>
const clans = {
  brujah: {
    name: "Бруха",
    desc: "Бунтари и революционеры.",
    link: "brujah.html"
  },
  toreador: {
    name: "Тореадор",
    desc: "Любители искусства и красоты.",
    link: "toreador.html"
  },
  ventrue: {
    name: "Вентру",
    desc: "Правящая элита.",
    link: "ventrue.html"
  },
  gangrel: {
    name: "Гангрел",
    desc: "Дикие и свободные.",
    link: "gangrel.html"
  },
  malkavian: {
    name: "Малкавиан",
    desc: "Безумцы с видениями.",
    link: "malkavian.html"
  },
  nosferatu: {
    name: "Носферату",
    desc: "Мастера тени и информации.",
    link: "nosferatu.html"
  },
  tremere: {
    name: "Тремер",
    desc: "Кровавые маги.",
    link: "tremere.html"
  }
};

function showClan(id) {
  const clan = clans[id];

  document.getElementById("clanName").innerText = clan.name;
  document.getElementById("clanDesc").innerText = clan.desc;

  const btn = document.getElementById("moreBtn");
  btn.style.display = "inline-block";
  btn.onclick = () => {
    window.location.href = clan.link;
  };
}
</script>

</body>
</html>
