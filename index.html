<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Vampire Clans</title>

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* Древо */
.tree {
  position: relative;
  margin-top: 100px;
}

/* Узлы */
.clan {
  position: absolute;
  width: 120px;
  cursor: pointer;
  text-align: center;
}

/* Иконки */
.clan img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid red;
  transition: 0.3s;
}

.clan img:hover {
  transform: scale(1.1);
  border-color: white;
}

/* Подпись */
.clan span {
  display: block;
  margin-top: 5px;
}

/* Линии (простые) */
.line {
  position: absolute;
  width: 2px;
  background: red;
}

/* Инфо */
#info {
  margin-top: 300px;
  padding: 20px;
  border-top: 1px solid gray;
}
</style>
</head>

<body>

<h1>Vampire Clans</h1>

<div class="tree">

  <!-- Центральный -->
  <div class="clan" style="top:0; left:45%;" onclick="showClan('ventrue')">
    <img src="images/ventrue.png">
    <span>Ventrue</span>
  </div>

  <!-- Левый -->
  <div class="clan" style="top:150px; left:25%;" onclick="showClan('brujah')">
    <img src="images/brujah.png">
    <span>Brujah</span>
  </div>

  <!-- Правый -->
  <div class="clan" style="top:150px; left:65%;" onclick="showClan('toreador')">
    <img src="images/toreador.png">
    <span>Toreador</span>
  </div>

</div>

<div id="info">
  <h2 id="clanName">Выбери клан</h2>
  <p id="clanDesc"></p>
  <button id="moreBtn" style="display:none;">Подробнее</button>
</div>

<script>
const clans = {
  brujah: {
    name: "Brujah",
    desc: "Бунтари и революционеры.",
    link: "brujah.html"
  },
  toreador: {
    name: "Toreador",
    desc: "Любители искусства.",
    link: "toreador.html"
  },
  ventrue: {
    name: "Ventrue",
    desc: "Элита и правители.",
    link: "ventrue.html"
  }
};

function showClan(id) {
  const clan = clans[id];

  document.getElementById("clanName").innerText = clan.name;
  document.getElementById("clanDesc").innerText = clan.desc;

  const btn = document.getElementById("moreBtn");
  btn.style.display = "inline-block";
  btn.onclick = () => {
    window.location.href = clan.link;
  };
}
</script>

</body>
</html>
