<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вампирские кланы</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 30px;
}

/* Контейнер */
.tree-container {
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

/* Узлы */
.node circle {
  fill: #111;
  stroke: white;
  stroke-width: 2;
  transition: 0.3s;
}

.node:hover circle {
  stroke: red;
  transform: scale(1.05);
  transform-origin: center;
}

/* Иконки белые */
.node image {
  pointer-events: none;
  filter: brightness(0) invert(1);
}

/* Текст под кланами */
.label {
  fill: white;
  font-size: 14px;
  text-anchor: middle;
  pointer-events: none;
}

/* Линии */
line {
  stroke: white;
  stroke-width: 2;
}

/* Инфо */
#info {
  margin-top: 40px;
  padding: 20px;
  border-top: 1px solid #333;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: black;
  color: white;
  border: 1px solid white;
  cursor: pointer;
}

button:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<h1>Вампирские кланы</h1>

<div class="tree-container">
<svg width="1000" height="600">

  <!-- ЛИНИИ -->
  <!-- Первый ряд -->
  <line x1="500" y1="120" x2="150" y2="300"/>
  <line x1="500" y1="120" x2="350" y2="300"/>
  <line x1="500" y1="120" x2="550" y2="300"/>
  <line x1="500" y1="120" x2="750" y2="300"/>

  <!-- Второй ряд -->
  <line x1="500" y1="120" x2="250" y2="500"/>
  <line x1="500" y1="120" x2="500" y2="500"/>
  <line x1="500" y1="120" x2="750" y2="500"/>

  <!-- CAMARILLA -->
  <g class="node">
    <circle cx="500" cy="120" r="60"/>
    <image href="images/camarilla.png" x="450" y="70" width="100" height="100"/>
  </g>

  <!-- ПЕРВЫЙ РЯД -->

  <!-- Бруха -->
  <g class="node" onclick="showClan('brujah')" style="cursor:pointer;">
    <circle cx="150" cy="300" r="50"/>
    <image href="images/brujah.png" x="110" y="260" width="80" height="80"/>
    <text x="150" y="370" class="label">Бруха</text>
  </g>

  <!-- Тореадор -->
  <g class="node" onclick="showClan('toreador')" style="cursor:pointer;">
    <circle cx="350" cy="300" r="50"/>
    <image href="images/toreador.png" x="310" y="260" width="80" height="80"/>
    <text x="350" y="370" class="label">Тореадор</text>
  </g>

  <!-- Вентру -->
  <g class="node" onclick="showClan('ventrue')" style="cursor:pointer;">
    <circle cx="550" cy="300" r="50"/>
    <image href="images/ventrue.png" x="510" y="260" width="80" height="80"/>
    <text x="550" y="370" class="label">Вентру</text>
  </g>

  <!-- Гангрел -->
  <g class="node" onclick="showClan('gangrel')" style="cursor:pointer;">
    <circle cx="750" cy="300" r="50"/>
    <image href="images/gangrel.png" x="710" y="260" width="80" height="80"/>
    <text x="750" y="370" class="label">Гангрел</text>
  </g>

  <!-- ВТОРОЙ РЯД -->

  <!-- Малкавиан -->
  <g class="node" onclick="showClan('malkavian')" style="cursor:pointer;">
    <circle cx="250" cy="500" r="50"/>
    <image href="images/malkavian.png" x="210" y="460" width="80" height="80"/>
    <text x="250" y="570" class="label">Малкавиан</text>
  </g>

  <!-- Носферату -->
  <g class="node" onclick="showClan('nosferatu')" style="cursor:pointer;">
    <circle cx="500" cy="500" r="50"/>
    <image href="images/nosferatu.png" x="460" y="460" width="80" height="80"/>
    <text x="500" y="570" class="label">Носферату</text>
  </g>

  <!-- Тремер -->
  <g class="node" onclick="showClan('tremere')" style="cursor:pointer;">
    <circle cx="750" cy="500" r="50"/>
    <image href="images/tremere.png" x="710" y="460" width="80" height="80"/>
    <text x="750" y="570" class="label">Тремер</text>
  </g>

</svg>
</div>

<div id="info">
  <h2 id="clanName">Выбери клан</h2>
  <p id="clanDesc"></p>
  <button id="moreBtn" style="display:none;">Подробнее</button>
</div>

<script>
const clans = {
  brujah: {
    name: "Бруха",
    desc: "Бунтари и революционеры.",
    link: "brujah.html"
  },
  toreador: {
    name: "Тореадор",
    desc: "Любители искусства и красоты.",
    link: "toreador.html"
  },
  ventrue: {
    name: "Вентру",
    desc: "Правящая элита.",
    link: "ventrue.html"
  },
  gangrel: {
    name: "Гангрел",
    desc: "Дикие и близкие к природе.",
    link: "gangrel.html"
  },
  malkavian: {
    name: "Малкавиан",
    desc: "Безумцы с пророческим даром.",
    link: "malkavian.html"
  },
  nosferatu: {
    name: "Носферату",
    desc: "Искажённые, но мастера информации.",
    link: "nosferatu.html"
  },
  tremere: {
    name: "Тремер",
    desc: "Маги крови и хранители тайных знаний.",
    link: "tremere.html"
  }
};

function showClan(id) {
  const clan = clans[id];

  document.getElementById("clanName").innerText = clan.name;
  document.getElementById("clanDesc").innerText = clan.desc;

  const btn = document.getElementById("moreBtn");
  btn.style.display = "inline-block";
  btn.onclick = () => {
    window.location.href = clan.link;
  };
}
</script>

</body>
</html>
